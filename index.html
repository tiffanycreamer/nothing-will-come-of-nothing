<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nothing Will Come of Nothing</title>

  <meta name="description" content="A psychological horror film. Sign up to receive the official trailer announcement." />

  <!-- Google Font Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Euphoria+Script&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>


<body>

<div class="page-shell">

  <!-- Background Image -->
  <div class="background"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Fog -->
  <div class="fog fog-one"></div>
  <div class="fog fog-two"></div>


  <main class="hero">

    <div class="hero-inner">

      <p class="eyebrow">
        a psychological horror film
      </p>


      <h1 class="title">
        <span>Nothing</span>
        <span>Will Come Of</span>
        <span>Nothing</span>
      </h1>


      <p class="tagline">
        Some lives refuse to stay buried.
      </p>


      <!-- Signup -->
      <div class="signup-panel">

        <p class="signup-copy">
          Be the first to see the official trailer.
        </p>

        <form
          class="signup-form"
          action="https://submit-form.com/YOUR_FORMSPARK_ENDPOINT"
          method="POST"
        >

          <label for="email" class="sr-only">Email address</label>

          <input
            id="email"
            name="email"
            type="email"
            placeholder="Enter your email"
            required
          />

          <button type="submit">
            Notify Me
          </button>

          <!-- Honeypot -->
          <input
            type="text"
            name="_honey"
            class="hidden-field"
            tabindex="-1"
            autocomplete="off"
          />

        </form>

        <p class="privacy-note">
          No spam. Only trailer and release updates.
        </p>

      </div>


      <p class="coming-soon">
        Coming Soon
      </p>


    </div>

  </main>

</div>


</body>
</html>
